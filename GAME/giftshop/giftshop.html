<!DOCTYPE html>
<html>
<head>
  <title>Museum Gift Shop</title>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Protest+Revolution&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="giftshop.css">
</head>

<body>

<div class="arcade-container">
  <h1 class="title">WIN A FORTUNE</h1>
  <div id="claw-machine">
    <div class="glass-area">
        <div id="phaser-game"></div>
    </div>
    <div class="machine-body">
        <div class="prize-chute"></div>
        <div class="dashboard">
            <div class="ui-display">
                <span id="coinCount">🪙 Coins: 10</span>
                <span id="timerText"></span>
            </div>
            <div class="controls">
                <button id="leftBtn" class="nav-btn">◀</button>
                <button id="dropBtn" class="grab-btn">GRAB</button>
                <button id="rightBtn" class="nav-btn">▶</button>
            </div>
        </div>
    </div>
  </div>
</div>
<div id="fortuneModal" class="modal-overlay">
    <div class="fortune-slip">
        <h3 id="modalName">MR FORTUNE COOKIE</h3>
        <hr>
        <p id="fortuneText"></p>
        <button id="closeModalBtn" class="modal-btn">ACKNOWLEDGE</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>
<script src="phaserClaw.js"></script>
</body>

</html>
