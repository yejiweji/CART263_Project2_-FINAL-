<!DOCTYPE html>
<html>
  <head>
    <title>Gift Shop — Culture Vulture Museum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Revolution&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="giftshop.css">
  </head>

  <body>
    <div class="museum-header">
        <h1 class="protest-revolution-regular">MUSEUM GIFT SHOP</h1>
        <p>Win a souvenir to take home!</p>
    </div>

    <div id="claw-machine">
        <div class="machine-top"></div>
        <div class="machine-body">
            <div class="glass-area">
                <div id="claw"></div>
                <div class="prizes" id="prize-container">
                    </div>
            </div>
        </div>
        <div class="controls">
            <button id="move-left">◀</button>
            <button id="drop-claw">CATCH</button>
            <button id="move-right">▶</button>
        </div>
    </div>

    <script src="giftshop.js"></script>
  </body>
</html>
